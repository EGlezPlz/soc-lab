# docker-compose.yml — Modo MIRROR
networks:
  mgmt-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24
  mirror-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/24

services:
  suricata:
    image: jasonish/suricata:latest
    container_name: suricata-mirror
    networks:
      mgmt-net:
        ipv4_address: 172.22.0.10
      mirror-net:
        ipv4_address: 172.23.0.10
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./config/suricata.yaml:/etc/suricata/suricata.yaml
      - ./rules/local.rules:/etc/suricata/rules/local.rules
      - ./logs:/var/log/suricata
    command: >
      -c /etc/suricata/suricata.yaml
      --af-packet
      -i eth1
      --init-errors-fatal
    restart: unless-stopped

  traffic-gen:
    image: alpine:latest
    container_name: traffic-gen
    networks:
      mirror-net:
        ipv4_address: 172.23.0.20
    command: sh -c "apk add --no-cache curl nmap iputils python3 && sleep infinity"
    restart: unless-stopped
