services:

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: soc-lab-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    volumes:
      # Socket de Docker — necesario para docker exec hacia MISP/Wazuh/Suricata
      - /var/run/docker.sock:/var/run/docker.sock
      # Código fuente (útil en desarrollo para ver cambios sin rebuild)
      - .:/app
    networks:
      - soc-lab-net
      - misp-docker_default   # acceso a MISP
      - wazuh-lab_wazuh-lab   # acceso a Wazuh Manager
      - suricata-lab_mgmt-net # acceso a Suricata
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    ports:
      - "8000:8000"

  # ── Frontend Vue 3 + Nginx ─────────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: soc-lab-frontend
    restart: unless-stopped
    ports:
      - "8080:80"   # SOC Lab accesible en http://localhost:8080
    networks:
      - soc-lab-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  # Red interna entre backend y frontend
  soc-lab-net:
    driver: bridge

  # Redes externas — deben existir antes de hacer docker compose up
  misp-docker_default:
    external: true

  wazuh-lab_wazuh-lab:
    external: true

  suricata-lab_mgmt-net:
    external: true
